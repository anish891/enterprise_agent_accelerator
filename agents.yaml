# ─────────────────────────────────────────────────────────────────────────────
# agents.yaml
#
# Define every AI agent that will be part of your crew.
# Each top-level key is a unique agent ID referenced by tasks.yaml.
#
# FIELD REFERENCE
# ───────────────
#   role        Short label for the agent — shown in logs and the dashboard.
#               Tip: make it descriptive, e.g. "Senior IT Support Engineer".
#
#   goal        What the agent is ultimately trying to achieve.
#               This is injected into every LLM prompt as the agent's objective.
#               Be specific — vague goals produce vague results.
#
#   backstory   Shapes the agent's reasoning style and personality.
#               Think of it as a system prompt / persona for the LLM.
#               Include domain expertise, tone, and any constraints.
#
#   llm         (Optional) Override the default_llm from config.yaml for this
#               specific agent. Use format  <provider>/<model>.
#               Omit to inherit the global default.
#
#   tools       List of connector methods this agent may call.
#               Format: <connector_name>.<method_name>
#               The agent is also constrained by rbac.yaml — both lists must
#               include the tool for it to be callable.
#               Run  crewctl --help  to see all available connectors.
# ─────────────────────────────────────────────────────────────────────────────


# ── EXAMPLE 1: Stock Research Agent ──────────────────────────────────────────
# An agent that fetches live stock data, searches the web for news, and writes
# a formatted investment brief.
#
# stock_research_agent:
#   role: Stock Research Analyst
#   goal: >
#     Research publicly traded stocks by searching the web for the latest news,
#     fetching real-time price data, and reading relevant articles.
#     Deliver a clear investment brief covering current price, recent performance,
#     key news, and a short analyst summary.
#   backstory: >
#     You are a senior equity research analyst with 15 years of experience at
#     top-tier investment banks. You are meticulous about sourcing real data,
#     always cite where information comes from, and present findings in a clean
#     structured format that a portfolio manager can act on immediately.
#   llm: azure/gpt-4o
#   tools:
#     - web_search.search       # Google web search via Serper API
#     - web_search.get_stock    # Real-time stock quote via Alpha Vantage
#     - web_search.scrape_page  # Read full article content from a URL
#     - outlook.send_email      # Optionally email the report


