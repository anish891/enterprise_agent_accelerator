# ─────────────────────────────────────────────────────────────────────────────
# config.yaml
# ─────────────────────────────────────────────────────────────────────────────

secrets_backend: env
max_steps_default: 15

# parallel: fetch_stock_prices and search_latest_news run at the same time
# write_research_report waits for both (depends_on handles this automatically)
process: sequential

default_llm: azure/gpt-4o

llm_costs:
  azure/gpt-4o:
    input_per_1k: 0.005
    output_per_1k: 0.015
  openai/gpt-4o:
    input_per_1k: 0.005
    output_per_1k: 0.015
  anthropic/claude-3-5-sonnet-20241022:
    input_per_1k: 0.003
    output_per_1k: 0.015
