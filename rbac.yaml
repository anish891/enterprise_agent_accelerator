# ─────────────────────────────────────────────────────────────────────────────
# rbac.yaml — tool permissions per agent role
# Wildcards supported: web_search.* = all web_search tools
# ─────────────────────────────────────────────────────────────────────────────

roles:
  it_support_agent:
    allowed_tools:
      - jira.*
      - servicenow.*
      - outlook.send_email
      - knowledge.search

  stock_research_agent:
    allowed_tools:
      - web_search.*        # all three web_search tools
      - outlook.send_email  # optional: email the report
