# ─────────────────────────────────────────────────────────────────────────────
# rbac.yaml — Role-Based Access Control
#
# Controls which connector methods each agent role may call at runtime.
# The orchestrator enforces this list before every tool call.
# If a tool is not listed here, the agent cannot use it even if it is
# declared in agents.yaml.
#
# FIELD REFERENCE
# ───────────────
#   roles.<role_name>           Must exactly match the  role:  value in
#                               agents.yaml (case-sensitive).
#
#   allowed_tools               List of  <connector>.<method>  strings.
#                               Wildcards are supported:
#                                 web_search.*  → all web_search methods
#                                 jira.*        → all jira methods
#                                 *             → every tool (use with caution)
#
# AVAILABLE CONNECTORS & METHODS
# ───────────────────────────────
#   web_search.search           Web search via Serper API
#   web_search.get_stock        Real-time stock quote via Alpha Vantage
#   web_search.scrape_page      Scrape full HTML content from a URL
#
#   jira.get_issue              Fetch a Jira issue by ID
#   jira.create_issue           Create a new Jira issue
#   jira.update_issue           Update fields on an existing Jira issue
#
#   servicenow.create_ticket    Create a ServiceNow incident
#   servicenow.update_ticket    Update a ServiceNow incident
#
#   confluence.get_page         Fetch a Confluence page by title
#   confluence.search           Full-text search across a Confluence space
#
#   sharepoint.get_file         Download a file from SharePoint
#   sharepoint.list_files       List files in a SharePoint folder
#
#   outlook.send_email          Send an email via Microsoft Graph API
#   outlook.read_emails         Read recent emails from an Outlook mailbox
#
#   sap.get_record              Query an SAP table record
#   sap.update_record           Update a field in an SAP table
#
#   knowledge.search            Semantic search the RAG vector store
# ─────────────────────────────────────────────────────────────────────────────


# roles:

  # ── EXAMPLE 1: Stock Research Analyst ────────────────────────────────────
  # Full access to all web_search tools plus the ability to send email reports.
  # Note: the role value must match the  role:  field in agents.yaml exactly.
  #
  # stock_research_analyst:
  #   allowed_tools:
  #     - web_search.*        # all three web_search methods
  #     - outlook.send_email  # optionally email the report


  # ── EXAMPLE 2: IT Support Specialist ─────────────────────────────────────
  # Access to Jira, ServiceNow, email, and the internal knowledge base.
  # No access to web search or SAP — least-privilege principle.
  #
  # it_support_specialist:
  #   allowed_tools:
  #     - jira.*              # all jira methods
  #     - servicenow.*        # all servicenow methods
  #     - outlook.send_email
  #     - knowledge.search


  # ── EXAMPLE 3: HR Specialist ──────────────────────────────────────────────
  # Access to SharePoint, email, and the knowledge base.
  #
  # hr_specialist:
  #   allowed_tools:
  #     - sharepoint.*
  #     - outlook.send_email
  #     - knowledge.search


  # ── EXAMPLE 4: Financial Analyst ──────────────────────────────────────────
  # Access to SAP records and email. Read-only SAP recommended for analysts.
  #
  # financial_analyst:
  #   allowed_tools:
  #     - sap.get_record      # read-only access
  #     - outlook.send_email
  #     - knowledge.search


  # ── EXAMPLE 5: Super Admin (all tools) ────────────────────────────────────
  # WARNING: use only for development / debugging. Never in production.
  #
  # super_admin:
  #   allowed_tools:
  #     - "*"                 # wildcard — every tool permitted


  # ── YOUR ROLE DEFINITION ──────────────────────────────────────────────────
  # The role name must match the  role:  field in agents.yaml exactly.
  #
  # <role_name>:
  #   allowed_tools:
  #     - <connector.method>  # e.g. jira.get_issue
  #     - <connector.*>       # e.g. web_search.*  (wildcard for all methods)

roles:
  lead_web_research_analyst:
    allowed_tools:
      - web_search.search
      - web_search.scrape_page
  senior_report_writer:
    allowed_tools: []