# ─────────────────────────────────────────────────────────────────────────────
# tasks.yaml
#
# Each task is a concrete piece of work assigned to an agent.
# 'description' is the actual instructions — be specific here.
# 'depends_on' controls order: [] means run first, [other_task] means wait.
# ─────────────────────────────────────────────────────────────────────────────

fetch_stock_prices:
  agent: stock_research_agent
  description: >
    Fetch the current stock price and key metrics for the following companies:
    Apple (AAPL), Microsoft (MSFT), and NVIDIA (NVDA).
    Use web_search.get_stock for each ticker one at a time.
    Compile all three results into a clean price summary table.
  expected_output: >
    A formatted table showing current price, daily change, and volume
    for AAPL, MSFT, and NVDA.
  depends_on: []

search_latest_news:
  agent: stock_research_agent
  description: >
    Search the web for the latest news on Apple, Microsoft, and NVIDIA stocks.
    Use web_search.search with queries like:
      - "AAPL Apple stock news today"
      - "MSFT Microsoft earnings forecast 2025"
      - "NVDA Nvidia AI chip demand outlook"
    For any article that looks particularly important, use web_search.scrape_page
    to read the full content of that article URL.
    Summarise the top 3 most relevant news items for each company.
  expected_output: >
    A news summary section with 3 bullet points per company covering
    the most recent and impactful news found.
  depends_on: []

write_research_report:
  agent: stock_research_agent
  description: >
    Using the stock prices and news gathered in the previous tasks,
    write a professional investment brief in this exact format:

    ## Stock Research Report — [Today's Date]

    ### AAPL — Apple Inc
    - Current Price: ...
    - Daily Change: ...
    - Key News: ...
    - Analyst View: [1-2 sentence assessment]

    ### MSFT — Microsoft Corp
    - Current Price: ...
    - Daily Change: ...
    - Key News: ...
    - Analyst View: [1-2 sentence assessment]

    ### NVDA — NVIDIA Corp
    - Current Price: ...
    - Daily Change: ...
    - Key News: ...
    - Analyst View: [1-2 sentence assessment]

    ### Summary
    [2-3 sentence overall market take]
  expected_output: >
    A complete, formatted stock research report covering all three companies
    with prices, news, and analyst commentary.
  depends_on:
    - fetch_stock_prices
    - search_latest_news

