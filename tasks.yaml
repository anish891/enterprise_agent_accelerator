# ─────────────────────────────────────────────────────────────────────────────
# tasks.yaml
#
# Define the concrete work your agents will perform.
# Each top-level key is a unique task ID.
#
# FIELD REFERENCE
# ───────────────
#   agent           The agent ID (from agents.yaml) that will execute this task.
#
#   description     The full instructions given to the agent for this task.
#                   Be explicit: name the tools to use, the data to fetch,
#                   and the format of the output you expect.
#                   This is directly injected into the LLM prompt.
#
#   expected_output A plain-English description of what a successful result
#                   looks like. Used by the orchestrator to evaluate completion.
#
#   depends_on      List of task IDs that must complete before this task starts.
#                   Use [] (empty list) for tasks that run immediately.
#                   When process: parallel, tasks with [] run concurrently.
#
# EXECUTION ORDER EXAMPLE
# ───────────────────────
#   task_a: depends_on: []        ← starts immediately
#   task_b: depends_on: []        ← starts immediately (parallel with task_a)
#   task_c: depends_on: [task_a, task_b]  ← waits for both
# ─────────────────────────────────────────────────────────────────────────────


